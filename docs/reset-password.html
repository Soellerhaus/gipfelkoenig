<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort zurücksetzen — Bergkönig</title>
  <meta name="theme-color" content="#d4a24c">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/layout.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="auth-page">
    <a href="/index.html" class="auth-logo">Bergkönig</a>

    <div class="auth-card">
      <h1>Neues Passwort</h1>

      <div id="loading-state">
        <p style="color: var(--color-muted); text-align: center;">Überprüfe Link...</p>
      </div>

      <form id="reset-form" style="display: none;">
        <div class="form-group">
          <label class="form-label" for="new-password">Neues Passwort</label>
          <input class="form-input" type="password" id="new-password" required minlength="8" autocomplete="new-password" placeholder="Mindestens 8 Zeichen">
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Passwort bestätigen</label>
          <input class="form-input" type="password" id="confirm-password" required autocomplete="new-password" placeholder="Nochmal eingeben">
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="reset-btn">
          Passwort speichern
        </button>

        <p id="reset-error" class="text-danger text-center" style="margin-top: 0.75rem; font-size: 0.85rem; display: none;"></p>
      </form>

      <div id="success-message" style="display: none; text-align: center;">
        <div style="font-size: 2rem; margin-bottom: 0.5rem;">✅</div>
        <h2 style="font-family: var(--font-display); margin-bottom: 0.5rem;">Passwort geändert!</h2>
        <p style="color: var(--color-muted); font-size: 0.85rem;">Du wirst zum Login weitergeleitet...</p>
      </div>

      <div id="invalid-link" style="display: none; text-align: center;">
        <div style="font-size: 2rem; margin-bottom: 0.5rem;">⚠️</div>
        <h2 style="font-family: var(--font-display); margin-bottom: 0.5rem;">Link ungültig</h2>
        <p style="color: var(--color-muted); font-size: 0.85rem;">
          Dieser Link ist abgelaufen oder ungültig. Bitte fordere einen neuen an.
        </p>
        <a href="/forgot-password.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">
          Neuen Link anfordern
        </a>
      </div>
    </div>
  </div>

  <script src="./js/api.js"></script>
  <script>
    let recoveryActive = false;

    GK.supabase.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryActive = true;
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('reset-form').style.display = 'block';
      }
    });

    // Fallback: wenn nach 3s kein Recovery-Event → Link ungültig
    setTimeout(() => {
      if (!recoveryActive) {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('invalid-link').style.display = 'block';
      }
    }, 3000);

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPw = document.getElementById('new-password').value;
      const confirmPw = document.getElementById('confirm-password').value;
      const errEl = document.getElementById('reset-error');
      const btn = document.getElementById('reset-btn');

      errEl.style.display = 'none';

      if (newPw !== confirmPw) {
        errEl.textContent = 'Passwörter stimmen nicht überein.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Speichere...';

      const { error } = await GK.supabase.auth.updateUser({ password: newPw });

      if (error) {
        errEl.textContent = 'Fehler beim Zurücksetzen. Bitte fordere einen neuen Link an.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Passwort speichern';
        return;
      }

      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('success-message').style.display = 'block';
      setTimeout(() => { window.location.href = '/login.html'; }, 2000);
    });
  </script>
</body>
</html>
